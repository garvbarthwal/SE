version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: welltrack_db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: welltrack
      POSTGRES_PASSWORD: welltrack_password
      POSTGRES_DB: welltrack
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
